<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" width="760">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>
  <!-- Background terminal -->
  <rect x="0" y="0" width="760" height="220" rx="0" fill="#111" stroke="url(#border)" stroke-width="3"/>
  <!-- Title bar -->
  <rect x="3" y="3" width="754" height="30" fill="#1a1a1a"/>
  <line x1="3" y1="33" x2="757" y2="33" stroke="#333" stroke-width="1"/>
  <circle cx="22" cy="18" r="5" fill="#dc2626"/>
  <circle cx="40" cy="18" r="5" fill="#555"/>
  <circle cx="58" cy="18" r="5" fill="#555"/>
  <text x="380" y="23" font-family="'Courier New',monospace" font-size="11" fill="#666" text-anchor="middle" letter-spacing="2">loehoer.ai - prd generator</text>
  <!-- Main title -->
  <text x="30" y="75" font-family="'Courier New',monospace" font-size="30" font-weight="bold" fill="#dc2626">&gt;&gt;&gt; loehoer.ai - prd generator &lt;&lt;&lt;</text>
  <text x="30" y="105" font-family="'Courier New',monospace" font-size="13" fill="#555">──────────────────────────────────────────────────</text>
  <!-- Info lines -->
  <text x="30" y="135" font-family="'Courier New',monospace" font-size="14" fill="#e0e0e0">$ model:</text>
  <text x="100" y="135" font-family="'Courier New',monospace" font-size="14" fill="#dc2626">groq cloud (llama-3.1-8b-instant)</text>
  <text x="30" y="160" font-family="'Courier New',monospace" font-size="14" fill="#e0e0e0">$ rag:</text>
  <text x="96" y="160" font-family="'Courier New',monospace" font-size="14" fill="#dc2626">chromadb + miniml-l6-v2 - 7 pdf</text>
  <text x="30" y="185" font-family="'Courier New',monospace" font-size="14" fill="#e0e0e0">$ eval:</text>
  <text x="101" y="185" font-family="'Courier New',monospace" font-size="14" fill="#dc2626">rouge-1/2/l</text>
  <!-- Blinking cursor -->
  <rect x="198" y="173" width="9" height="16" fill="#dc2626" rx="0">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  <!-- Scanline -->
  <rect x="3" y="3" width="754" height="3" fill="rgba(220,38,38,0.12)">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 214; 0 0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
